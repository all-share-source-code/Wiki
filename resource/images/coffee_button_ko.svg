<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="450" viewBox="0 0 1600 450" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFDD00"/>
      <stop offset="100%" stop-color="#FFC700"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="450" rx="40" fill="url(#g)"/>

  <!-- Coffee cup icon -->
  <g transform="translate(130,95) scale(2.2)">
    <rect x="40" y="60" width="120" height="90" rx="12" fill="#000" opacity="0.92"/>
    <rect x="30" y="145" width="140" height="18" rx="9" fill="#000" opacity="0.92"/>
    <path d="M165,82 h30 a24,24 0 0 1 0,48 h-30 z" fill="#000" opacity="0.92"/>
    <path d="M70,40 c0,-18 20,-18 20,-36" stroke="#000" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M104,40 c0,-18 20,-18 20,-36" stroke="#000" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Text: 커피한잔 후원하기 -->
