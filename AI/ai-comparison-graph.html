<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 모델 성능 비교 그래프</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7, #ff6fd8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1rem;
            color: #999;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .controls button {
            padding: 0.6rem 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .controls button.active {
            background: linear-gradient(135deg, #7b2ff7, #00d2ff);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 16px rgba(123, 47, 247, 0.4);
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .chart-card h2 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            color: #ddd;
            text-align: center;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
            max-height: 500px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .info-section {
            margin-top: 2rem;
        }

        .info-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        table thead th {
            background: rgba(123, 47, 247, 0.25);
            padding: 0.8rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #ccc;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        table tbody td {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #bbb;
        }

        table tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-top { background: rgba(0, 210, 255, 0.2); color: #00d2ff; }
        .badge-high { background: rgba(123, 47, 247, 0.2); color: #b388ff; }
        .badge-mid { background: rgba(255, 183, 77, 0.2); color: #ffb74d; }

        footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            color: #666;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            header h1 { font-size: 1.6rem; }
            .chart-card { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 모델 성능 비교 그래프</h1>
            <p>주요 AI 모델들의 벤치마크 성능을 한눈에 비교합니다 (2025-2026)</p>
        </header>

        <div class="controls">
            <button class="active" onclick="showChart('all')">전체 비교</button>
            <button onclick="showChart('reasoning')">추론 능력</button>
            <button onclick="showChart('coding')">코딩 능력</button>
            <button onclick="showChart('math')">수학 능력</button>
            <button onclick="showChart('language')">언어 이해</button>
        </div>

        <div class="chart-card">
            <h2 id="mainChartTitle">전체 벤치마크 성능 비교</h2>
            <div class="chart-wrapper">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div class="grid-2">
            <div class="chart-card">
                <h2>모델별 종합 점수</h2>
                <div class="chart-wrapper">
                    <canvas id="overallChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>비용 대비 성능 (가성비)</h2>
                <div class="chart-wrapper">
                    <canvas id="costChart"></canvas>
                </div>
            </div>
        </div>

        <div class="chart-card info-section">
            <h2>벤치마크 상세 점수</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>모델</th>
                            <th>MMLU</th>
                            <th>HumanEval</th>
                            <th>MATH</th>
                            <th>GPQA</th>
                            <th>ARC-C</th>
                            <th>등급</th>
                        </tr>
                    </thead>
                    <tbody id="scoreTable"></tbody>
                </table>
            </div>
        </div>

        <footer>
            <p>데이터 출처: 각 모델 공식 기술 보고서 및 공개 벤치마크 결과 기준 (2025-2026)</p>
            <p style="margin-top: 0.3rem;">BJStudio Wiki &middot; AI 성능 비교</p>
        </footer>
    </div>

    <script>
        const MODELS = [
            'GPT-4o',
            'GPT-4.5',
            'Claude 3.5 Sonnet',
            'Claude 3.5 Opus',
            'Gemini 2.0 Pro',
            'Gemini 2.0 Ultra',
            'Llama 3.1 405B',
            'DeepSeek-V3',
            'Grok-3',
            'Mistral Large 2'
        ];

        const COLORS = [
            'rgba(16, 163, 127, 0.85)',
            'rgba(30, 200, 160, 0.85)',
            'rgba(204, 120, 50, 0.85)',
            'rgba(230, 155, 80, 0.85)',
            'rgba(66, 133, 244, 0.85)',
            'rgba(100, 170, 255, 0.85)',
            'rgba(156, 39, 176, 0.85)',
            'rgba(0, 150, 255, 0.85)',
            'rgba(244, 67, 54, 0.85)',
            'rgba(255, 152, 0, 0.85)'
        ];

        const BORDER_COLORS = COLORS.map(c => c.replace('0.85', '1'));

        const benchmarks = {
            all: {
                labels: ['MMLU', 'HumanEval', 'MATH', 'GPQA', 'ARC-Challenge', 'HellaSwag'],
                data: [
                    [88.7, 90.2, 76.6, 53.6, 96.4, 95.3],
                    [90.8, 88.0, 80.2, 58.2, 97.1, 96.1],
                    [88.7, 92.0, 78.3, 59.4, 96.7, 95.8],
                    [91.2, 93.5, 82.1, 62.3, 97.5, 96.5],
                    [89.5, 89.5, 80.4, 57.8, 96.9, 96.0],
                    [92.3, 91.8, 84.5, 64.1, 97.8, 96.8],
                    [86.1, 89.0, 73.8, 48.0, 94.8, 94.5],
                    [87.5, 90.8, 79.2, 55.3, 95.7, 95.0],
                    [89.0, 88.7, 77.8, 56.5, 96.2, 95.5],
                    [84.0, 85.5, 70.5, 45.2, 93.5, 93.2]
                ]
            },
            reasoning: {
                labels: ['GPQA', 'ARC-Challenge', 'HellaSwag', 'WinoGrande', 'BoolQ'],
                data: [
                    [53.6, 96.4, 95.3, 87.5, 93.2],
                    [58.2, 97.1, 96.1, 89.8, 94.5],
                    [59.4, 96.7, 95.8, 88.2, 94.0],
                    [62.3, 97.5, 96.5, 90.5, 95.2],
                    [57.8, 96.9, 96.0, 88.9, 93.8],
                    [64.1, 97.8, 96.8, 91.3, 95.8],
                    [48.0, 94.8, 94.5, 85.3, 91.5],
                    [55.3, 95.7, 95.0, 87.0, 93.0],
                    [56.5, 96.2, 95.5, 87.8, 93.5],
                    [45.2, 93.5, 93.2, 83.5, 90.0]
                ]
            },
            coding: {
                labels: ['HumanEval', 'MBPP', 'CodeContests', 'SWE-bench', 'LiveCodeBench'],
                data: [
                    [90.2, 87.8, 32.5, 33.2, 42.1],
                    [88.0, 86.2, 35.8, 38.5, 44.8],
                    [92.0, 89.4, 38.2, 49.0, 48.5],
                    [93.5, 91.0, 41.5, 52.3, 51.2],
                    [89.5, 88.0, 34.5, 36.8, 43.5],
                    [91.8, 90.2, 39.8, 42.5, 47.2],
                    [89.0, 86.5, 28.0, 23.0, 35.5],
                    [90.8, 88.5, 36.8, 42.0, 46.8],
                    [88.7, 87.0, 33.0, 35.5, 41.8],
                    [85.5, 83.2, 25.5, 20.5, 32.0]
                ]
            },
            math: {
                labels: ['MATH', 'GSM8K', 'MGSM', 'MathVista', 'Minerva MATH'],
                data: [
                    [76.6, 95.8, 90.5, 63.8, 74.2],
                    [80.2, 96.8, 92.3, 68.5, 78.5],
                    [78.3, 96.4, 91.8, 67.2, 76.8],
                    [82.1, 97.2, 93.5, 71.0, 80.5],
                    [80.4, 96.5, 91.5, 66.8, 78.0],
                    [84.5, 97.8, 94.2, 73.5, 83.2],
                    [73.8, 94.2, 88.5, 58.0, 70.5],
                    [79.2, 96.0, 91.0, 65.5, 77.0],
                    [77.8, 95.5, 90.2, 64.0, 75.5],
                    [70.5, 93.0, 86.5, 55.2, 67.8]
                ]
            },
            language: {
                labels: ['MMLU', 'MMLU-Pro', 'TriviaQA', 'NaturalQA', 'DROP'],
                data: [
                    [88.7, 73.5, 88.0, 62.5, 83.7],
                    [90.8, 78.2, 89.5, 65.8, 86.0],
                    [88.7, 75.8, 87.5, 63.2, 84.5],
                    [91.2, 79.5, 90.0, 67.0, 87.2],
                    [89.5, 76.0, 88.8, 64.0, 85.0],
                    [92.3, 80.5, 91.2, 68.5, 88.5],
                    [86.1, 70.2, 85.0, 58.5, 80.0],
                    [87.5, 72.8, 86.8, 61.0, 82.5],
                    [89.0, 74.0, 87.5, 63.0, 83.8],
                    [84.0, 68.5, 83.2, 56.0, 78.0]
                ]
            }
        };

        const chartTitles = {
            all: '전체 벤치마크 성능 비교',
            reasoning: '추론 능력 벤치마크',
            coding: '코딩 능력 벤치마크',
            math: '수학 능력 벤치마크',
            language: '언어 이해 벤치마크'
        };

        const overallScores = MODELS.map((_, i) => {
            const all = benchmarks.all.data[i];
            return +(all.reduce((a, b) => a + b, 0) / all.length).toFixed(1);
        });

        const costPerMToken = [2.5, 10.0, 3.0, 15.0, 1.25, 7.0, 1.0, 0.27, 3.0, 2.0];
        const costEfficiency = overallScores.map((score, i) => +(score / costPerMToken[i]).toFixed(1));

        let mainChartInstance = null;
        let overallChartInstance = null;
        let costChartInstance = null;

        const defaultTooltip = {
            backgroundColor: 'rgba(20, 20, 40, 0.95)',
            titleFont: { size: 13 },
            bodyFont: { size: 12 },
            padding: 12,
            cornerRadius: 8,
            borderColor: 'rgba(255,255,255,0.1)',
            borderWidth: 1
        };

        const defaultLegend = {
            labels: {
                color: '#aaa',
                font: { size: 12 },
                padding: 16,
                usePointStyle: true,
                pointStyle: 'circle'
            }
        };

        function createMainChart(category) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChartInstance) mainChartInstance.destroy();

            const bm = benchmarks[category];
            const datasets = MODELS.map((model, i) => ({
                label: model,
                data: bm.data[i],
                backgroundColor: COLORS[i].replace('0.85', '0.2'),
                borderColor: BORDER_COLORS[i],
                borderWidth: 2,
                pointBackgroundColor: BORDER_COLORS[i],
                pointBorderColor: '#fff',
                pointBorderWidth: 1,
                pointRadius: 4,
                pointHoverRadius: 6
            }));

            mainChartInstance = new Chart(ctx, {
                type: 'radar',
                data: { labels: bm.labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        r: {
                            beginAtZero: false,
                            min: Math.max(0, Math.min(...bm.data.flat()) - 10),
                            max: 100,
                            ticks: { color: '#666', backdropColor: 'transparent', stepSize: 10 },
                            grid: { color: 'rgba(255,255,255,0.06)' },
                            angleLines: { color: 'rgba(255,255,255,0.06)' },
                            pointLabels: { color: '#aaa', font: { size: 12 } }
                        }
                    },
                    plugins: {
                        legend: defaultLegend,
                        tooltip: defaultTooltip
                    }
                }
            });
        }

        function createOverallChart() {
            const ctx = document.getElementById('overallChart').getContext('2d');
            if (overallChartInstance) overallChartInstance.destroy();

            const sorted = MODELS.map((m, i) => ({ model: m, score: overallScores[i], color: COLORS[i], border: BORDER_COLORS[i] }))
                .sort((a, b) => b.score - a.score);

            overallChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(d => d.model),
                    datasets: [{
                        label: '종합 점수',
                        data: sorted.map(d => d.score),
                        backgroundColor: sorted.map(d => d.color),
                        borderColor: sorted.map(d => d.border),
                        borderWidth: 1,
                        borderRadius: 6,
                        barPercentage: 0.7
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        x: {
                            min: 70,
                            max: 95,
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.04)' }
                        },
                        y: {
                            ticks: { color: '#aaa', font: { size: 11 } },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: defaultTooltip
                    }
                }
            });
        }

        function createCostChart() {
            const ctx = document.getElementById('costChart').getContext('2d');
            if (costChartInstance) costChartInstance.destroy();

            costChartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: MODELS.map((model, i) => ({
                        label: model,
                        data: [{ x: costPerMToken[i], y: overallScores[i] }],
                        backgroundColor: COLORS[i],
                        borderColor: BORDER_COLORS[i],
                        borderWidth: 2,
                        pointRadius: 10,
                        pointHoverRadius: 14
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        x: {
                            type: 'logarithmic',
                            title: { display: true, text: '비용 ($/1M 토큰)', color: '#aaa' },
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.04)' }
                        },
                        y: {
                            min: 75,
                            max: 95,
                            title: { display: true, text: '종합 점수', color: '#aaa' },
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.04)' }
                        }
                    },
                    plugins: {
                        legend: defaultLegend,
                        tooltip: {
                            ...defaultTooltip,
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: 점수 ${ctx.parsed.y}, 비용 $${ctx.parsed.x}/1M tokens`
                            }
                        }
                    }
                }
            });
        }

        function populateTable() {
            const tbody = document.getElementById('scoreTable');
            const rows = MODELS.map((model, i) => {
                const d = benchmarks.all.data[i];
                const avg = overallScores[i];
                let badge;
                if (avg >= 88) badge = '<span class="badge badge-top">최상위</span>';
                else if (avg >= 84) badge = '<span class="badge badge-high">상위</span>';
                else badge = '<span class="badge badge-mid">중상위</span>';
                return `<tr>
                    <td><strong>${model}</strong></td>
                    <td>${d[0]}</td>
                    <td>${d[1]}</td>
                    <td>${d[2]}</td>
                    <td>${d[3]}</td>
                    <td>${d[4]}</td>
                    <td>${badge}</td>
                </tr>`;
            });
            tbody.innerHTML = rows.join('');
        }

        function showChart(category) {
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('mainChartTitle').textContent = chartTitles[category];
            createMainChart(category);
        }

        createMainChart('all');
        createOverallChart();
        createCostChart();
        populateTable();
    </script>
</body>
</html>
